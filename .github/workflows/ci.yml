name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: clojure -X:test
      - run: node bin/kotoba-office-style.js
